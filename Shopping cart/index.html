<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/9d055c21e3.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="style.css" />
    <title>Shopping cart</title>
  </head>
  <body>
    <div class="wrapped">
      <h1>Shopping Cart</h1>
      <div class="cart">
        <div class="tshirt1">
          <img src="./images/tshirt.jpeg" />
          <h4>Cotton</h4>
        </div>
        <div class="tshirt2">
          <div class="image">
            <img src="./images/tshirt.jpeg" />
          </div>
          <div class="abtProduct">
            <h4>Shirt</h4>
            <p>Cotton T-shirt</p>
          </div>
          <div class="counter">
            <button id="increment">+</button>
            <h1 id="count">0</h1>
            <button id="decrement">-</button>
          </div>
          <div class="price">
            <p>$13</p>
          </div>
        </div>
        <div class="tshirt3">
          <img src="./images/tshirt.jpeg" />
          <h4>Cotton</h4>
        </div>
      </div>
    </div>
    <!-- <div class="summary">
      <h1>Summary</h1>
    </div> -->
    <script src="app.js"></script>
  </body>
</html>
